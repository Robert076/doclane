AWSTemplateFormatVersion: "2010-09-09"

Description: |
        The RDS Database of Doclane. Robert is an AWS Certified Professional as a student btw, got it like that.
        Clean asf.

Parameters:
        AZ1:
                Type: String
        DbInstanceType:
                Type: String

Resources:
        RDS:
                Type: AWS::RDS::DBInstance
                Properties:
                        DBName: doclane
                        Engine: postgres
                        EngineVersion: "17"
                        AllocatedStorage: 20
                        AllowMajorVersionUpgrade: false
                        DBSubnetGroupName: !Ref RDSSubnetGroup
                        VPCSecurityGroups:
                                - !ImportValue doclane-rds-sg-id
                        BackupRetentionPeriod: 0
                        CertificateRotationRestart: true
                        ApplyImmediately: true
                        DBInstanceClass: !Ref DbInstanceType
                        DBParameterGroupName: !Ref RDSParameterGroup
                        AvailabilityZone: !Ref AZ1
                        MasterUsername: !Sub "{{resolve:ssm:/doclane/rds/username}}"
                        MasterUserPassword: !Sub "{{resolve:ssm:/doclane/rds/password}}"
                        StorageEncrypted: true

        RDSSubnetGroup:
                Type: AWS::RDS::DBSubnetGroup
                Properties:
                        DBSubnetGroupDescription: Subnet group for Doclane RDS
                        SubnetIds:
                                - !ImportValue doclane-private-subnet-1-id
                                - !ImportValue doclane-private-subnet-2-id

        RDSParameterGroup:
                Type: AWS::RDS::DBParameterGroup
                Properties:
                        Description: Enforce SSL for Doclane Postgres RDS
                        Family: postgres17
                        Parameters:
                                rds.force_ssl: "1"

Outputs:
        RDSEndpoint:
                Value: !GetAtt RDS.Endpoint.Address
                Export:
                        Name: doclane-rds-endpoint
