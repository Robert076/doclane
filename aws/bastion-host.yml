AWSTemplateFormatVersion: "2010-09-09"

Description: |
        Bastion Host needed to SSH tunnel to the RDS instance for initialization.

Parameters:
        InstanceType:
                Type: String
        AZ1:
                Type: String

Resources:
        Bastion:
                Type: AWS::EC2::Instance
                Properties:
                        AvailabilityZone: !Ref AZ1
                        SubnetId: !ImportValue doclane-public-subnet-1-id
                        ImageId: ami-0442403fb8d244144
                        KeyName: doclane-bastion-key
                        InstanceType: !Ref InstanceType
                        SecurityGroupIds:
                                - !ImportValue doclane-bastion-sg-id
                        UserData:
                                Fn::Base64: |
                                        #!/bin/bash
                                        dnf install postgresql17 -y
                        Tags:
                                - Key: Name
                                  Value: doclane-bastion-host
                                - Key: Description
                                  Value: Bastion Host needed for initial setup of RDS database.
