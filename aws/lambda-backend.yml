AWSTemplateFormatVersion: "2010-09-09"
Description: |
  The Lambda backend of Doclane. It uses Lambda in a VPC,
  this is where the API is deployed. Fronted by an ALB,
  completely private and secure.
Resources:
  LambdaBackend:
    Type: AWS::Lambda::Function
    Properties:
      Architectures:
        - arm64
      FunctionName: DoclaneBackend
      Role: !GetAtt LambdaBackendRole.Arn
      Handler: bootstrap
      Runtime: provided.al2023
      Code:
        S3Bucket: doclane-rds-lambda-code
        S3Key: doclane-backend.zip
      VpcConfig:
        SecurityGroupIds:
          - !ImportValue doclane-lambda-sg-id
        SubnetIds:
          - !ImportValue doclane-private-subnet-1-id
          - !ImportValue doclane-private-subnet-2-id
      Timeout: 20
      MemorySize: 256
      Environment:
        Variables:
          # Database
          DB_HOST: !ImportValue doclane-rds-endpoint
          DB_PORT: "5432"
          DB_NAME: doclane
          SSM_USERNAME_PATH: /doclane/rds/username
          SSM_PASSWORD_PATH: /doclane/rds/password
          # S3
          S3_BUCKET_NAME: doclane-documents
          # Cognito — values come from the cognito.yml stack outputs
          AWS_REGION: !Ref AWS::Region
          COGNITO_USER_POOL_ID: !ImportValue DoclaneUserPoolId
          COGNITO_CLIENT_ID: !ImportValue DoclaneUserPoolClientId
          # Seed secret for demo admin creation — stored in SSM, never hardcoded
          SEED_SECRET: !Sub "{{resolve:ssm:/doclane/seed-secret}}"

  LambdaBackendRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: doclane-backend-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  LambdaBackendPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: doclane-lambda-backend-policy
      Roles:
        - !Ref LambdaBackendRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # SSM Parameter Store
          - Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/doclane/*

          # KMS decrypt (for SSM SecureString params)
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: "*"

          # S3 documents bucket
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:GetObjectVersion
            Resource: !Sub arn:aws:s3:::doclane-documents/*

          # Lambda code bucket (read-only)
          - Effect: Allow
            Action:
              - s3:GetObject
            Resource: arn:aws:s3:::doclane-rds-lambda-code/*

          # Textract
          - Effect: Allow
            Action:
              - textract:DetectDocumentText
            Resource: "*"

          # Bedrock
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource: "*"

          # Polly
          - Effect: Allow
            Action:
              - polly:SynthesizeSpeech
            Resource: "*"

          # Cognito — needed to verify tokens and manage users if required
          - Effect: Allow
            Action:
              - cognito-idp:AdminGetUser
            Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${COGNITO_USER_POOL_ID}

Outputs:
  LambdaFunctionName:
    Value: !Ref LambdaBackend
    Export:
      Name: doclane-backend-function-name
  LambdaFunctionArn:
    Value: !GetAtt LambdaBackend.Arn
    Export:
      Name: doclane-backend-function-arn