AWSTemplateFormatVersion: "2010-09-09"
Description: |
        Private API Gateway needed for the web servers to interact with Lambda

Resources:
        Api:
                Type: AWS::ApiGateway::RestApi
                Properties:
                        Name: doclane-rest-api
                        Description: Private REST API connecting web servers to backend Lambda
                        EndpointConfiguration:
                                Types:
                                        - PRIVATE
                                VpcEndpointIds:
                                        - !ImportValue doclane-api-gateway-interface-endpoint-id
                        Policy:
                                Statement:
                                        - Effect: Allow
                                          Principal: "*"
                                          Action: execute-api:Invoke
                                          Resource: execute-api:/*
                                          Condition:
                                                  StringEquals:
                                                          aws:sourceVpce: !ImportValue doclane-api-gateway-interface-endpoint-id

        ProxyResource:
                Type: AWS::ApiGateway::Resource
                Properties:
                        RestApiId: !Ref Api
                        ParentId: !GetAtt Api.RootResourceId
                        PathPart: "{proxy+}"

        ProxyMethod:
                Type: AWS::ApiGateway::Method
                Properties:
                        RestApiId: !Ref Api
                        ResourceId: !Ref ProxyResource
                        HttpMethod: ANY
                        AuthorizationType: NONE
                        Integration:
                                Type: AWS_PROXY
                                IntegrationHttpMethod: POST
                                Uri: !Sub
                                        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
                                        - LambdaArn: !ImportValue doclane-backend-function-arn

        RootMethod:
                Type: AWS::ApiGateway::Method
                Properties:
                        RestApiId: !Ref Api
                        ResourceId: !GetAtt Api.RootResourceId
                        HttpMethod: ANY
                        AuthorizationType: NONE
                        Integration:
                                Type: AWS_PROXY
                                IntegrationHttpMethod: POST
                                Uri: !Sub
                                        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
                                        - LambdaArn: !ImportValue doclane-backend-function-arn

        LambdaPermission:
                Type: AWS::Lambda::Permission
                Properties:
                        FunctionName: !ImportValue doclane-backend-function-arn
                        Action: lambda:InvokeFunction
                        Principal: apigateway.amazonaws.com
                        SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*/*

        Deployment:
                Type: AWS::ApiGateway::Deployment
                DependsOn:
                        - ProxyMethod
                        - RootMethod
                Properties:
                        RestApiId: !Ref Api

        Stage:
                Type: AWS::ApiGateway::Stage
                Properties:
                        RestApiId: !Ref Api
                        DeploymentId: !Ref Deployment
                        StageName: prod

Outputs:
        ApiId:
                Value: !Ref Api
                Export:
                        Name: doclane-rest-api-id

        ApiEndpoint:
                Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod
                Export:
                        Name: doclane-rest-api-endpoint
